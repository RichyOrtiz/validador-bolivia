<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador Serie B</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="banner-bolivia"></div>

    <header class="navbar">
        <img src="img/logo_ingenieros.png" class="logo-animado" alt="Logo">
        <div class="titulo-central">
            <h1>CONTROL DE SERIE</h1>
            <h2>Billetes Serie B</h2>
        </div>
        <img src="img/logo.png" class="logo-animado" alt="Logo Empresa">
    </header>

    <main class="content">
        <div class="glass-card">
            <button id="btnVolver" class="btn-back hidden" onclick="volverAtras()">← Volver</button>

            <div id="step1">
                <button class="btn-blue" onclick="activarEscaner()">📷 ESCANEAR SERIE</button>
                <button class="btn-gray" onclick="mostrarPaso2()">⌨️ DIGITAR SERIE</button>
            </div>

            <div id="step2" class="hidden">
                <h3>Selecciona el Billete</h3>
                <div class="cortes-grid">
                    <img src="img/billete-10.jpg" onclick="seleccionarCorte(10)" alt="10">
                    <img src="img/billete-20.jpg" onclick="seleccionarCorte(20)" alt="20">
                    <img src="img/billete-50.jpg" onclick="seleccionarCorte(50)" alt="50">
                </div>
            </div>

            <div id="visualizer" class="hidden">
                <img id="billeteGrande" src="" class="img-preview">
            </div>

            <div id="inputArea" class="hidden">
                <input type="number" id="serieInput" placeholder="Número de serie">
                <button class="btn-green" onclick="verificar()">VERIFICAR</button>
            </div>

            <div id="resultContainer" class="result-box hidden"></div>
            <button id="btnReset" class="btn-gray hidden" style="margin-top:10px" onclick="reiniciarProceso()">Verificar Otro</button>
        </div>
    </main>

    <div id="scanner-modal" class="modal-scanner" style="display: none;">
        <div class="modal-box">
            <span class="btn-cerrar" onclick="cerrarEscaner()">&times;</span>
            <h3 style="margin-bottom: 15px;">Encuadra la Serie</h3>
            <div id="reader"></div>
            <p style="font-size: 0.9rem; color: #555; margin-top: 10px;">
                Aleja el billete unos 15cm para enfocar.
            </p>
        </div>
    </div>

    <footer class="footer-simple">
        &copy; 2026 Richard - Sistemas e Ingeniería
    </footer>

    <audio id="audioBeep" src="img/beep.mp3"></audio>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
